services:
  db:
    image: postgres:16-alpine
    container_name: psych_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: psych
    ports:
      - "5432:5432"
    volumes:
      - psych_pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: psych_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - psych_miniodata:/data

volumes:
  psych_pgdata:
  psych_miniodata:
